services:
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: wp-content-autopilot
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-3100}:3100"
    env_file:
      - ../.env
    volumes:
      # Persist SQLite database
      - pipeline-data:/app/data
      # Mount custom prompts (optional)
      - ../prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pipeline-data:
